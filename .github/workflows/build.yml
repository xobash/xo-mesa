name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Fast gate: type-check, unit tests, and the web build on Linux.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Native desktop bundles. Windows first, Linux last (project priority).
  desktop:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Add macOS universal build targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - name: Install Linux system dependencies (WebKitGTK)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev
      - run: npm ci
      - name: Build the desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.name == 'macos' && '--target universal-apple-darwin' || matrix.name == 'windows' && '--bundles msi,nsis' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: mesa-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/universal-apple-darwin/release/bundle/**/*
          if-no-files-found: ignore
